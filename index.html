        .sb{background:linear-gradient(180deg,#FF7043 0%,#F4511E 40%,#D84315 100%);border:4px solid #BF360C;border-radius:16px;color:#fff;font-family:'Fredoka One',cursive;font-size:1.6rem;text-shadow:2px 3px 4px rgba(0,0,0,.5);box-shadow:3px 6px 20px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.3);cursor:pointer;transition:all .2s ease;padding:14px 50px;letter-spacing:2px}

        .cloud{position:absolute;background:rgba(255,255,255,.7);border-radius:50px;filter:blur(1px)}

        .td{position:absolute;bottom:0}

<script>
/* ==================== AUDIO ==================== */
var audioCtx=null;
var bgMusic=document.getElementById('bgMusic');
var isMuted=false;

function ea(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();}

function startMusic(){
    bgMusic.volume=0.12;
    bgMusic.play().catch(function(){});
}
function stopMusic(){bgMusic.pause();bgMusic.currentTime=0;}
function toggleMute(){
    isMuted=!isMuted;
    bgMusic.muted=isMuted;
    document.getElementById('muteBtn').innerHTML=isMuted?'<i class="fas fa-volume-mute"></i>':'<i class="fas fa-volume-up"></i>';
}

function popSnd(){ea();var t=audioCtx.currentTime,bL=Math.floor(audioCtx.sampleRate*0.12),buf=audioCtx.createBuffer(1,bL,audioCtx.sampleRate),d=buf.getChannelData(0);for(var i=0;i<bL;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/bL,4);var ns=audioCtx.createBufferSource();ns.buffer=buf;var ng=audioCtx.createGain();ng.gain.setValueAtTime(0.45,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.12);ns.connect(ng).connect(audioCtx.destination);ns.start(t);ns.stop(t+0.12);var o=audioCtx.createOscillator();o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(150,t+0.08);var og=audioCtx.createGain();og.gain.setValueAtTime(0.35,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.1);o.connect(og).connect(audioCtx.destination);o.start(t);o.stop(t+0.1);}
function winSnd(){ea();var t=audioCtx.currentTime;[523.25,659.25,783.99,1046.5,1318.5].forEach(function(f,i){var o=audioCtx.createOscillator();o.type='sine';o.frequency.value=f;var g=audioCtx.createGain();var s=t+i*0.12;g.gain.setValueAtTime(0,s);g.gain.linearRampToValueAtTime(0.25,s+0.04);g.gain.exponentialRampToValueAtTime(0.001,s+0.5);o.connect(g).connect(audioCtx.destination);o.start(s);o.stop(s+0.5);});setTimeout(function(){var t2=audioCtx.currentTime;[523.25,659.25,783.99].forEach(function(f){var o=audioCtx.createOscillator();o.type='triangle';o.frequency.value=f;var g=audioCtx.createGain();g.gain.setValueAtTime(0.15,t2);g.gain.exponentialRampToValueAtTime(0.001,t2+0.8);o.connect(g).connect(audioCtx.destination);o.start(t2);o.stop(t2+0.8);});},700);}
function errSnd(){ea();var t=audioCtx.currentTime,o=audioCtx.createOscillator();o.type='sawtooth';o.frequency.setValueAtTime(180,t);o.frequency.linearRampToValueAtTime(90,t+0.25);var g=audioCtx.createGain();g.gain.setValueAtTime(0.18,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.28);var fl=audioCtx.createBiquadFilter();fl.type='lowpass';fl.frequency.value=600;o.connect(fl).connect(g).connect(audioCtx.destination);o.start(t);o.stop(t+0.3);}

/* ==================== ESTADO ==================== */
var COLS=['#FF5252','#FF6D00','#FFD600','#00E676','#FF4081','#00E5FF','#FF3D00','#AA00FF','#00BFA5','#F50057','#76FF03','#FF9100'];
var canvas,ctx;
var gameState='menu';
var selTable='all';
var selDiff='normal';
var selGameMode='play';
var gameMode='singleTable';
var questions=[];
var curQ=0;
var balloons=[];
var particles=[];
var score=0,maxScore=0,errors=0;
var clouds=[];
var afId=null;
var memoryRemain=0;

/* ==================== GLOBO ==================== */
function Balloon(x,y,num,color,correct,radius){
    this.x=x;this.y=y;this.number=num;this.color=color;this.isCorrect=correct;
    this.radius=Math.max(18,radius);this.vx=(Math.random()-0.5)*1.4;this.vy=(Math.random()-0.5)*1.4-0.2;
    this.alive=true;this.shake=0;this.wob=Math.random()*Math.PI*2;this.wobS=0.012+Math.random()*0.018;
    this.opacity=1;this.dying=false;this.colR=this.radius*0.9; // radio de colisión
}
Balloon.prototype.update=function(w,h){
    if(this.dying){this.opacity-=0.08;if(this.opacity<=0)this.alive=false;return;}
    if(!this.alive)return;
    this.wob+=this.wobS;this.x+=this.vx+Math.sin(this.wob)*0.3;this.y+=this.vy+Math.cos(this.wob*0.7)*0.18;
    var t=130+this.radius,b=h-50-this.radius,l=this.radius+5,r=w-this.radius-5;
    if(this.x<l){this.x=l;this.vx=Math.abs(this.vx)*0.8;}if(this.x>r){this.x=r;this.vx=-Math.abs(this.vx)*0.8;}
    if(this.y<t){this.y=t;this.vy=Math.abs(this.vy)*0.8;}if(this.y>b){this.y=b;this.vy=-Math.abs(this.vy)*0.8;}
    if(this.shake>0)this.shake--;
};
Balloon.prototype.draw=function(c){
    if(!this.alive)return;
    var ox=this.shake>0?Math.sin(this.shake*1.5)*6:0,x=this.x+ox,y=this.y,r=this.radius;
    c.save();c.globalAlpha=Math.max(0,this.opacity);
    c.beginPath();c.moveTo(x,y+r);c.quadraticCurveTo(x+4,y+r+16,x-3,y+r+32);c.strokeStyle='rgba(120,120,120,0.5)';c.lineWidth=1.2;c.stroke();
    c.beginPath();c.ellipse(x,y,r*0.82,r,0,0,Math.PI*2);
    var g=c.createRadialGradient(x-r*0.25,y-r*0.3,r*0.08,x,y,r);
    g.addColorStop(0,this._l(this.color,60));g.addColorStop(0.5,this.color);g.addColorStop(1,this._d(this.color,40));
    c.fillStyle=g;c.fill();
    c.beginPath();c.ellipse(x-r*0.22,y-r*0.28,r*0.18,r*0.32,-0.3,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.45)';c.fill();
    c.beginPath();c.moveTo(x-4,y+r-1);c.lineTo(x,y+r+5);c.lineTo(x+4,y+r-1);c.closePath();c.fillStyle=this._d(this.color,25);c.fill();
    c.fillStyle='#fff';c.font='bold '+Math.round(r*0.7)+'px "Fredoka One",cursive';c.textAlign='center';c.textBaseline='middle';
    c.shadowColor='rgba(0,0,0,0.35)';c.shadowBlur=3;c.shadowOffsetX=1;c.shadowOffsetY=1;
    c.fillText(this.number,x,y+1);c.shadowBlur=0;c.shadowOffsetX=0;c.shadowOffsetY=0;c.restore();
};
Balloon.prototype.contains=function(px,py){
    if(!this.alive||this.dying)return false;
    var dx=px-this.x,dy=py-this.y,rx=this.radius*0.82,ry=this.radius;
    return(dx*dx)/(rx*rx)+(dy*dy)/(ry*ry)<=1.15;
};
Balloon.prototype._l=function(h,a){var n=parseInt(h.slice(1),16);return'rgb('+Math.min(255,(n>>16)+a)+','+Math.min(255,((n>>8)&0xff)+a)+','+Math.min(255,(n&0xff)+a)+')';};
Balloon.prototype._d=function(h,a){var n=parseInt(h.slice(1),16);return'rgb('+Math.max(0,(n>>16)-a)+','+Math.max(0,((n>>8)&0xff)-a)+','+Math.max(0,(n&0xff)-a)+')';};

/* ==================== COLISIÓN ENTRE GLOBOS ==================== */
function resolveCollisions(){
    var alive=balloons.filter(function(b){return b.alive&&!b.dying;});
    for(var i=0;i<alive.length;i++){
        for(var j=i+1;j<alive.length;j++){
            var a=alive[i],b=alive[j];
            var dx=b.x-a.x,dy=b.y-a.y;
            var dist=Math.sqrt(dx*dx+dy*dy);
            var minDist=a.colR+b.colR;
            if(dist<minDist&&dist>0.01){
                // Normalizar vector de separación
                var nx=dx/dist,ny=dy/dist;
                // Separar globos para que no se superpongan
                var overlap=(minDist-dist)*0.5+0.5;
                a.x-=nx*overlap;a.y-=ny*overlap;
                b.x+=nx*overlap;b.y+=ny*overlap;
                // Intercambiar componentes de velocidad沿 la normal (rebote elástico suave)
                var dvx=a.vx-b.vx,dvy=a.vy-b.vy;
                var dot=dvx*nx+dvy*ny;
                if(dot>0){
                    a.vx-=dot*nx*0.5;a.vy-=dot*ny*0.5;
                    b.vx+=dot*nx*0.5;b.vy+=dot*ny*0.5;
                }
                // Limitar velocidad para que no se vuelvan locos
                var maxV=2.2;
                [a,b].forEach(function(bl){
                    var spd=Math.sqrt(bl.vx*bl.vx+bl.vy*bl.vy);
                    if(spd>maxV){bl.vx=(bl.vx/spd)*maxV;bl.vy=(bl.vy/spd)*maxV;}
                });
            }
        }
    }
}

function Particle(x,y,color){this.x=x;this.y=y;this.color=color;var a=Math.random()*Math.PI*2,s=2+Math.random()*6;this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-2;this.grav=0.12;this.life=1;this.decay=0.015+Math.random()*0.02;this.sz=2+Math.random()*5;this.rot=Math.random()*Math.PI*2;this.rotS=(Math.random()-0.5)*0.3;this.sh=Math.random()>0.4;}
Particle.prototype.update=function(){this.x+=this.vx;this.y+=this.vy;this.vy+=this.grav;this.vx*=0.99;this.life-=this.decay;this.rot+=this.rotS;};
Particle.prototype.draw=function(c){if(this.life<=0)return;c.save();c.globalAlpha=Math.max(0,this.life);c.translate(this.x,this.y);c.rotate(this.rot);c.fillStyle=this.color;if(this.sh){c.beginPath();c.arc(0,0,this.sz,0,Math.PI*2);c.fill();}else{c.fillRect(-this.sz,-this.sz*0.5,this.sz*2,this.sz);}c.restore();};

/* ==================== PREGUNTAS ==================== */
function generateQuestions(){
    questions=[];
    if(gameMode==='singleTable'||gameMode==='memory'){
        for(var i=1;i<=10;i++) questions.push({a:selTable,b:i,answer:selTable*i});
        shuf(questions);
    } else {
        var count;if(selDiff==='easy') count=10;else if(selDiff==='hard') count=20;else count=15;
        var pool=[];for(var t=1;t<=12;t++) for(var i2=1;i2<=10;i2++) pool.push({a:t,b:i2,answer:t*i2});
        shuf(pool); questions=pool.slice(0,count);
    }
    maxScore=questions.length*10;
}

/* ==================== NÚMEROS INCORRECTOS ==================== */
function genWrongs(correct,tableNum,count,exclude){
    var wr=new Set();
    for(var i=1;i<=10;i++){var v=tableNum*i;if(v!==correct&&!exclude.has(v))wr.add(v);}
    for(var d=-6;d<=6;d++){if(d!==0&&correct+d>0&&!exclude.has(correct+d))wr.add(correct+d);}
    var att=0;while(wr.size<count+20&&att<400){var r=Math.max(1,Math.floor(Math.random()*(Math.max(correct,20)+50))+1);if(!exclude.has(r))wr.add(r);att++;}
    wr.delete(correct);var arr=Array.from(wr);shuf(arr);return arr.slice(0,count);
}

/* ==================== CANTIDADES POR DIFICULTAD ==================== */
function getFillerCount(){
    var m=canvas.width<600;
    if(selDiff==='easy') return m?3:5;
    if(selDiff==='hard') return m?12:18;
    return m?7:10;
}
function getNewPerRound(){
    var m=canvas.width<600;
    if(selDiff==='easy') return m?4:5;
    if(selDiff==='hard') return m?5:7;
    return m?5:6;
}
function getMemoryCounts(){
    // FACIL=10, NORMAL=15, DIFICIL=20
    if(selDiff==='easy') return {c:10,w:4};
    if(selDiff==='hard') return {c:20,w:5};
    return {c:15,w:5};
}

/* ==================== COLOCAR GLOBO SIN SOLAPAR ==================== */
function placeBalloons(allNums,isCorrectFn){
    var m=canvas.width<600;
    var radius=m?Math.min(36,canvas.width/15):Math.min(28,canvas.width/24);
    var margin=radius+8,top=140+radius,bottom=canvas.height-50-radius,left=margin,right=canvas.width-margin;
    var placed=[];
    allNums.forEach(function(num,idx){
        var x,y,tries=0,ok=false;
        while(tries<200&&!ok){
            x=left+Math.random()*(right-left);
            y=top+Math.random()*(bottom-top);
            ok=true;
            for(var p=0;p<placed.length;p++){
                var dx=x-placed[p].x,dy=y-placed[p].y;
                if(Math.sqrt(dx*dx+dy*dy)<radius*2.2){ok=false;break;}
            }
            tries++;
        }
        placed.push({x:x,y:y});
        var b=new Balloon(x,y,num,COLS[idx%COLS.length],isCorrectFn(num),radius);
        balloons.push(b);
    });
}

/* ==================== SPAWN: TABLA COMPLETA ==================== */
function spawnFullTable(){
    balloons=[];particles=[];
    var t=selTable;
    var fillerCount=getFillerCount();
    var correctSet=new Set();for(var i=1;i<=10;i++)correctSet.add(t*i);
    var wrongNums=genWrongs(0,t,fillerCount,correctSet);
    var allNums=[];for(var j=1;j<=10;j++)allNums.push(t*j);
    allNums=allNums.concat(wrongNums);shuf(allNums);
    placeBalloons(allNums,function(n){return correctSet.has(n);});
}

/* ==================== SPAWN: TODAS LAS TABLAS ==================== */
function spawnMixedNext(){
    if(curQ>=questions.length)return;
    var q=questions[curQ];
    var newCount=getNewPerRound();
    var wrongCount=newCount-1;
    var existing=new Set();balloons.forEach(function(b){if(b.alive&&!b.dying)existing.add(b.number);});
    var wrongs=genWrongs(q.answer,q.a,wrongCount,existing);
    var allNums=[q.answer].concat(wrongs);shuf(allNums);
    var m=canvas.width<600;
    var radius=m?Math.min(36,canvas.width/15):Math.min(28,canvas.width/24);
    var margin=radius+8,top=140+radius,bottom=canvas.height-50-radius,left=margin,right=canvas.width-margin;
    var existingBalloons=balloons.filter(function(b){return b.alive&&!b.dying;});
    allNums.forEach(function(num,i){
        var x,y,tries=0,ok=false;
        while(tries<150&&!ok){
            x=left+Math.random()*(right-left);
            y=top+Math.random()*(bottom-top);
            ok=true;
            for(var p=0;p<existingBalloons.length;p++){
                var dx=x-existingBalloons[p].x,dy=y-existingBalloons[p].y;
                if(Math.sqrt(dx*dx+dy*dy)<radius*2.2){ok=false;break;}
            }
            // También verificar contra los nuevos que ya se colocaron en esta ronda
            for(var p2=balloons.length-1;p2>=0;p2--){
                var nb=balloons[p2];
                if(!nb.alive||nb.dying)continue;
                var dx2=x-nb.x,dy2=y-nb.y;
                if(Math.sqrt(dx2*dx2+dy2*dy2)<radius*2.2){ok=false;break;}
            }
            tries++;
        }
        var b=new Balloon(x,y,num,COLS[i%COLS.length],num===q.answer,radius);
        balloons.push(b);
        existingBalloons.push(b);
    });
}

/* ==================== SPAWN: AYUDA MEMORIA ==================== */
function spawnMemoryQ(){
    // Limpiar solo los muertos, no los vivos (no debería haber vivos al llegar aquí)
    balloons=balloons.filter(function(b){return b.alive&&!b.dying;});
    particles=particles.filter(function(p){return p.life>0;});
    if(curQ>=questions.length)return;
    var q=questions[curQ];
    var counts=getMemoryCounts();
    var correctCount=counts.c,wrongCount=counts.w;
    memoryRemain=correctCount;
    var wrongs=genWrongs(q.answer,q.a,wrongCount,new Set());
    var allNums=[];for(var i=0;i<correctCount;i++)allNums.push(q.answer);
    allNums=allNums.concat(wrongs);shuf(allNums);
    // Ajustar tamaño de globo si hay muchos
    var m=canvas.width<600;
    var totalGlobos=allNums.length;
    var radius;
    if(totalGlobos>18) radius=m?Math.min(28,canvas.width/18):Math.min(22,canvas.width/26);
    else if(totalGlobos>12) radius=m?Math.min(32,canvas.width/16):Math.min(25,canvas.width/23);
    else radius=m?Math.min(38,canvas.width/14):Math.min(30,canvas.width/22);

    var margin=radius+6,top=145+radius,bottom=canvas.height-45-radius,left=margin,right=canvas.width-margin;
    allNums.forEach(function(num,i){
        var x,y,tries=0,ok=false;
        while(tries<200&&!ok){
            x=left+Math.random()*(right-left);
            y=top+Math.random()*(bottom-top);
            ok=true;
            for(var p=0;p<balloons.length;p++){
                var b=balloons[p];
                if(!b.alive||b.dying)continue;
                var dx=x-b.x,dy=y-b.y;
                if(Math.sqrt(dx*dx+dy*dy)<radius*2.15){ok=false;break;}
            }
            tries++;
        }
        var b=new Balloon(x,y,num,COLS[i%COLS.length],num===q.answer,radius);
        balloons.push(b);
    });
}

/* ==================== INTERACCIÓN ==================== */
function handleInteract(px,py){
    if(gameState!=='playing'||curQ>=questions.length)return;
    for(var i=balloons.length-1;i>=0;i--){
        var b=balloons[i];
        if(!b.alive||b.dying)continue;
        if(b.contains(px,py)){
            var q=questions[curQ];
            if(gameMode==='memory'){
                if(b.isCorrect){
                    b.alive=false;memoryRemain--;popSnd();
                    for(var p=0;p<15;p++)particles.push(new Particle(b.x,b.y,COLS[Math.floor(Math.random()*COLS.length)]));
                    if(memoryRemain<=0){
                        score+=10;
                        balloons.forEach(function(ob){if(ob.alive&&!ob.dying)ob.dying=true;});
                        setTimeout(function(){
                            balloons=balloons.filter(function(b){return!b.alive;});
                            particles=particles.filter(function(p){return p.life>0;});
                            curQ++;
                            if(curQ>=questions.length)endGame();
                            else spawnMemoryQ();
                        },500);
                    }
                } else {
                    b.shake=20;score=Math.max(0,score-1);errors++;errSnd();
                }
            } else if(gameMode==='singleTable'){
                if(b.isCorrect&&b.number===q.answer){
                    b.alive=false;score+=10;popSnd();
                    for(var p2=0;p2<25;p2++)particles.push(new Particle(b.x,b.y,COLS[Math.floor(Math.random()*COLS.length)]));
                    setTimeout(function(){curQ++;if(curQ>=questions.length)endGame();},350);
                } else {
                    b.shake=20;score=Math.max(0,score-2);errors++;errSnd();
                }
            } else {
                if(b.isCorrect&&b.number===q.answer){
                    b.alive=false;score+=10;popSnd();
                    for(var p3=0;p3<25;p3++)particles.push(new Particle(b.x,b.y,COLS[Math.floor(Math.random()*COLS.length)]));
                    setTimeout(function(){curQ++;if(curQ>=questions.length)endGame();else spawnMixedNext();},350);
                } else {
                    b.shake=20;score=Math.max(0,score-2);errors++;errSnd();
                }
            }
            return;
        }
    }
}

/* ==================== FIN DE JUEGO ==================== */
function endGame(){
    gameState='results';winSnd();
    var pct=score/maxScore,sc=0;
    if(pct>=0.9)sc=3;else if(pct>=0.7)sc=2;else if(pct>=0.4)sc=1;
    document.getElementById('resOv').style.display='flex';
    var stE=document.getElementById('starsC');stE.innerHTML='';
    for(var i=0;i<3;i++){var s=document.createElement('i');s.className='fas fa-star star '+(i<sc?'a':'i');stE.appendChild(s);}
    var tE=document.getElementById('rTitle');
    if(sc>=2){tE.textContent='FELICIDADES';tE.style.color='#FF6F00';}
    else if(sc===1){tE.textContent='BIEN HECHO';tE.style.color='#F9A825';}
    else{tE.textContent='SIGUE INTENTANDO';tE.style.color='#E53935';}
    document.getElementById('rScore').textContent='Puntuacion: '+score+' / '+maxScore;
    document.getElementById('rDetail').textContent=errors+' error'+(errors!==1?'es':'')+' en total';
}

/* ==================== GAME LOOP ==================== */
function gameLoop(){
    if(gameState!=='playing')return;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBG();
    // Actualizar posiciones
    balloons.forEach(function(b){b.update(canvas.width,canvas.height);});
    // Resolver colisiones entre globos
    resolveCollisions();
    // Dibujar
    balloons.forEach(function(b){b.draw(ctx);});
    particles=particles.filter(function(p){return p.life>0;});
    particles.forEach(function(p){p.update();p.draw(ctx);});
    drawHUD();
    afId=requestAnimationFrame(gameLoop);
}

/* ==================== UTILIDADES ==================== */
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}}

/* ==================== PANTALLAS ==================== */
function showMenu(){
    gameState='menu';if(afId)cancelAnimationFrame(afId);
    stopMusic();
    document.getElementById('selScr').style.display='flex';
    document.getElementById('gameCanvas').style.display='none';
    document.getElementById('resOv').style.display='none';
    document.getElementById('backBtn').style.display='none';
    document.getElementById('muteBtn').style.display='none';
}
function startGame(){
    ea();gameState='playing';score=0;errors=0;curQ=0;particles=[];balloons=[];memoryRemain=0;
    if(selTable!=='all'&&selGameMode==='memory') gameMode='memory';
    else if(selTable!=='all') gameMode='singleTable';
    else gameMode='mixed';
    generateQuestions();
    document.getElementById('selScr').style.display='none';
    document.getElementById('resOv').style.display='none';
    document.getElementById('gameCanvas').style.display='block';
    document.getElementById('backBtn').style.display='block';
    document.getElementById('muteBtn').style.display='block';
    resizeCanvas();initClouds();
    startMusic();
    if(gameMode==='singleTable') spawnFullTable();
    else if(gameMode==='mixed') spawnMixedNext();
    else if(gameMode==='memory') spawnMemoryQ();
    gameLoop();
}
function resizeCanvas(){
    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    balloons.forEach(function(b){b.x=Math.min(Math.max(b.radius+5,b.x),canvas.width-b.radius-5);b.y=Math.min(Math.max(140+b.radius,b.y),canvas.height-50-b.radius);});
}

/* ==================== EVENTOS ==================== */
document.addEventListener('DOMContentLoaded',function(){
    canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
    if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r=[r,r,r,r];this.moveTo(x+r[0],y);this.arcTo(x+w,y,x+w,y+h,r[1]);this.arcTo(x+w,y+h,x,y+h,r[2]);this.arcTo(x,y+h,x,y,r[3]);this.arcTo(x,y,x+w,y,r[0]);this.closePath();};}

    var numBtns=document.querySelectorAll('.nb');
    var allBtn=document.getElementById('allBtn');
    var modeSec=document.getElementById('modeSec');

    numBtns.forEach(function(btn){
        btn.addEventListener('click',function(){
            numBtns.forEach(function(b){b.classList.remove('sel');});
            allBtn.classList.remove('sel');
            btn.classList.add('sel');
            selTable=parseInt(btn.getAttribute('data-table'));
            document.getElementById('chalkEx').textContent=selTable+' x 3 = '+(selTable*3);
            modeSec.style.display='flex';
        });
    });
    allBtn.addEventListener('click',function(){
        numBtns.forEach(function(b){b.classList.remove('sel');});
        allBtn.classList.add('sel');
        selTable='all';selGameMode='play';
        document.getElementById('chalkEx').textContent='7 x 8 = 56';
        modeSec.style.display='none';
    });

    var modeBtns=document.querySelectorAll('.mb');
    modeBtns.forEach(function(btn){
        btn.addEventListener('click',function(){
            modeBtns.forEach(function(b){b.classList.remove('sel');});
            btn.classList.add('sel');
            selGameMode=btn.getAttribute('data-mode');
        });
    });

    var diffBtns=document.querySelectorAll('.db');
    diffBtns.forEach(function(btn){
        btn.addEventListener('click',function(){
            diffBtns.forEach(function(b){b.classList.remove('sel');});
            btn.classList.add('sel');
            selDiff=btn.getAttribute('data-diff');
        });
    });

    document.getElementById('startBtn').addEventListener('click',startGame);
    document.getElementById('backBtn').addEventListener('click',showMenu);
    document.getElementById('muteBtn').addEventListener('click',toggleMute);
    document.getElementById('againBtn').addEventListener('click',function(){document.getElementById('resOv').style.display='none';startGame();});
    document.getElementById('menuBtn').addEventListener('click',showMenu);
    canvas.addEventListener('click',function(e){var r=canvas.getBoundingClientRect();handleInteract(e.clientX-r.left,e.clientY-r.top);});
    canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];var r=canvas.getBoundingClientRect();handleInteract(t.clientX-r.left,t.clientY-r.top);},{passive:false});
    window.addEventListener('resize',function(){if(gameState==='playing'){resizeCanvas();initClouds();}});
});
</script>
</body>
</html>
