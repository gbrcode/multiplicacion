<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Globos de Multiplicar</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config={theme:{extend:{fontFamily:{display:['Fredoka One','cursive'],body:['Nunito','sans-serif']}}}}
    </script>
    <style>
        :root{--wb:#5C3317}
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;font-family:'Nunito',sans-serif;touch-action:none}

        /* ===== PANTALLA DE LOGIN ===== */
        #loginScr{position:fixed;inset:0;z-index:150;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 30%,#0f3460 60%,#1a1a2e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        #loginScr .login-card{background:linear-gradient(180deg,#D4A373 0%,#C68642 40%,#A0522D 80%,#8B4513 100%);border:5px solid var(--wb);border-radius:20px;padding:30px 35px;box-shadow:0 20px 60px rgba(0,0,0,0.7),inset 0 3px 0 rgba(255,255,255,0.2);text-align:center;max-width:400px;width:100%;position:relative;animation:loginPop .5s cubic-bezier(.175,.885,.32,1.275)}
        @keyframes loginPop{0%{transform:scale(.6) translateY(40px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}
        #loginScr .login-card::before,#loginScr .login-card::after{content:'';position:absolute;width:12px;height:12px;background:radial-gradient(circle at 35% 35%,#bbb,#666);border-radius:50%;top:14px}
        #loginScr .login-card::before{left:16px}#loginScr .login-card::after{right:16px}
        #loginScr .login-input{width:100%;padding:14px 18px;border:3px solid var(--wb);border-radius:12px;background:linear-gradient(135deg,#2E4A3E 0%,#1B3629 50%,#263F34 100%);color:#FFF8DC;font-family:'Fredoka One',cursive;font-size:1.2rem;text-align:center;outline:none;box-shadow:inset 0 0 15px rgba(0,0,0,0.4);transition:all .2s}
        #loginScr .login-input::placeholder{color:rgba(255,248,220,0.4);font-size:1rem}
        #loginScr .login-input:focus{border-color:#FF6F00;box-shadow:inset 0 0 15px rgba(0,0,0,0.4),0 0 15px rgba(255,111,0,0.3)}
        #loginScr .login-btn{background:linear-gradient(180deg,#FF7043 0%,#F4511E 40%,#D84315 100%);border:4px solid #BF360C;border-radius:14px;color:#fff;font-family:'Fredoka One',cursive;font-size:1.4rem;text-shadow:2px 3px 4px rgba(0,0,0,.5);box-shadow:3px 6px 20px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.3);cursor:pointer;transition:all .2s ease;padding:14px 50px;letter-spacing:2px;margin-top:18px;width:100%}
        #loginScr .login-btn:hover{transform:translateY(-3px) scale(1.03)}#loginScr .login-btn:active{transform:translateY(2px) scale(.97)}
        #loginScr .login-err{color:#FF5252;font-family:'Fredoka One',cursive;font-size:.85rem;margin-top:10px;min-height:20px;text-shadow:1px 1px 2px rgba(0,0,0,.5)}
        .login-balloon{position:absolute;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:.15;animation:loginFlb var(--d) ease-in-out infinite;pointer-events:none}
        @keyframes loginFlb{0%,100%{transform:translateY(0) rotate(var(--r))}50%{transform:translateY(-30px) rotate(calc(var(--r)+8deg))}}
        .login-star{position:absolute;color:#FFD600;opacity:.2;animation:twinkle var(--d) ease-in-out infinite;pointer-events:none}
        @keyframes twinkle{0%,100%{opacity:.1;transform:scale(.8)}50%{opacity:.4;transform:scale(1.2)}}

        /* ===== PANTALLA DE SELECCION ===== */
        #selScr{position:fixed;inset:0;z-index:100;background:linear-gradient(180deg,#FFF8E1 0%,#FFE0B2 20%,#C8E6C9 45%,#66BB6A 55%,#388E3C 75%,#1B5E20 100%);display:none;flex-direction:column;align-items:center;overflow-y:auto;padding:20px 10px 40px}
        /* Contenedor con z-index para estar arriba de decoraciones */
        .sel-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%;max-width:500px}
        .ws{background:linear-gradient(180deg,#D4A373 0%,#C68642 40%,#A0522D 80%,#8B4513 100%);border:4px solid var(--wb);border-radius:14px;padding:16px 32px;box-shadow:3px 6px 18px rgba(0,0,0,0.4),inset 0 2px 0 rgba(255,255,255,0.25);position:relative;text-align:center}
        .ws::before,.ws::after{content:'';position:absolute;width:10px;height:10px;background:radial-gradient(circle at 35% 35%,#bbb,#666);border-radius:50%;top:10px}
        .ws::before{left:14px}.ws::after{right:14px}

        /* ===== BOTONES NUMERO ===== */
        .nb{background:linear-gradient(180deg,#E8C170 0%,#D4A373 30%,#C68642 70%,#A0522D 100%);border:3px solid var(--wb);border-radius:10px;color:#FFF8DC;font-family:'Fredoka One',cursive;font-size:1.3rem;text-shadow:1px 2px 3px rgba(0,0,0,0.5);box-shadow:2px 4px 10px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.3);cursor:pointer;transition:all .15s ease;width:58px;height:58px;display:flex;align-items:center;justify-content:center}
        .nb:hover{transform:translateY(-3px) scale(1.05)}.nb:active{transform:translateY(1px) scale(.97)}

        /* ===== BOTON TODAS LAS TABLAS ===== */
        .ab{background:linear-gradient(180deg,#81C784 0%,#4CAF50 50%,#2E7D32 100%);border:3px solid #1B5E20;border-radius:10px;color:#fff;font-family:'Fredoka One',cursive;font-size:.85rem;text-shadow:1px 2px 2px rgba(0,0,0,.4);box-shadow:2px 4px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25);cursor:pointer;transition:all .15s ease;padding:10px 20px}
        .ab:hover{transform:translateY(-2px)}

        /* ===== BOTONES DIFICULTAD ===== */
        .db{background:linear-gradient(180deg,#7986CB 0%,#5C6BC0 50%,#3949AB 100%);border:3px solid #283593;border-radius:10px;color:#fff;font-family:'Fredoka One',cursive;font-size:.9rem;text-shadow:1px 2px 2px rgba(0,0,0,.4);box-shadow:2px 4px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25);cursor:pointer;transition:all .15s ease;padding:10px 22px}
        .db:hover{transform:translateY(-2px)}

        /* ===== BOTONES MODO JUEGO ===== */
        .mb{border-radius:10px;color:#fff;font-family:'Fredoka One',cursive;font-size:.9rem;text-shadow:1px 2px 2px rgba(0,0,0,.4);box-shadow:2px 4px 10px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.25);cursor:pointer;transition:all .2s ease;padding:12px 24px;position:relative}
        .mb:hover{transform:translateY(-2px)}
        .mb.play{background:linear-gradient(180deg,#26A69A 0%,#00897B 50%,#00695C 100%);border:3px solid #004D40}
        .mb.mem{background:linear-gradient(180deg,#FFA726 0%,#FB8C00 50%,#EF6C00 100%);border:3px solid #E65100}
        .mb.disabled{opacity:0.4;cursor:not-allowed;pointer-events:none}

        /* ===== ESTADO SELECCIONADO - BORDE DORADO + GLOW PULSANTE ===== */
        .nb.sel,.ab.sel,.db.sel,.mb.sel{
            background:linear-gradient(180deg,#FFB300 0%,#FF8F00 40%,#FF6F00 100%) !important;
            border:3px solid #FFD600 !important;
            box-shadow:0 0 0 2px rgba(255,214,0,0.5),0 0 18px rgba(255,143,0,0.6),0 0 35px rgba(255,214,0,0.25),inset 0 1px 0 rgba(255,255,255,0.4) !important;
            transform:scale(1.08);
            animation:selGlow 1.8s ease-in-out infinite;
            color:#fff !important;
        }
        @keyframes selGlow{
            0%,100%{box-shadow:0 0 0 2px rgba(255,214,0,0.5),0 0 18px rgba(255,143,0,0.6),0 0 35px rgba(255,214,0,0.25),inset 0 1px 0 rgba(255,255,255,0.4)}
            50%{box-shadow:0 0 0 4px rgba(255,214,0,0.7),0 0 28px rgba(255,143,0,0.8),0 0 50px rgba(255,214,0,0.35),inset 0 1px 0 rgba(255,255,255,0.5)}
        }
        /* Indicador debajo del boton seleccionado */
        .nb.sel::after,.ab.sel::after,.db.sel::after,.mb.sel::after{
            content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
            width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #FFD600;
        }

        /* ===== BOTON INICIO ===== */
        .sb{background:linear-gradient(180deg,#FF7043 0%,#F4511E 40%,#D84315 100%);border:4px solid #BF360C;border-radius:16px;color:#fff;font-family:'Fredoka One',cursive;font-size:1.6rem;text-shadow:2px 3px 4px rgba(0,0,0,.5);box-shadow:3px 6px 20px rgba(0,0,0,.4),inset 0 2px 0 rgba(255,255,255,.3);cursor:pointer;transition:all .2s ease;padding:14px 50px;letter-spacing:2px}
        .sb:hover{transform:translateY(-4px) scale(1.05)}.sb:active{transform:translateY(2px) scale(.97)}

        /* ===== PIZARRA ===== */
        .cb{background:linear-gradient(135deg,#2E4A3E 0%,#1B3629 50%,#263F34 100%);border:6px solid #8D6E63;border-radius:8px;box-shadow:3px 5px 15px rgba(0,0,0,.5),inset 0 0 30px rgba(0,0,0,.3);padding:12px 20px;color:#E0E0E0;font-family:'Fredoka One',cursive;font-size:1.4rem;text-shadow:1px 1px 2px rgba(0,0,0,.5)}

        /* ===== DECORACIONES - SIN INTERFERENCIA DE CLIC ===== */
        .cloud{position:absolute;background:rgba(255,255,255,.7);border-radius:50px;filter:blur(1px);pointer-events:none;z-index:1}
        .cloud::before,.cloud::after{content:'';position:absolute;background:inherit;border-radius:50%}
        .c1{width:100px;height:36px;top:8%;left:5%;animation:fc 20s ease-in-out infinite}
        .c1::before{width:50px;height:50px;top:-20px;left:15px}.c1::after{width:40px;height:40px;top:-15px;left:50px}
        .c2{width:80px;height:28px;top:15%;right:10%;animation:fc 25s ease-in-out infinite reverse}
        .c2::before{width:40px;height:40px;top:-18px;left:10px}.c2::after{width:35px;height:35px;top:-12px;left:40px}
        .c3{width:120px;height:40px;top:5%;left:45%;animation:fc 30s ease-in-out infinite}
        .c3::before{width:55px;height:55px;top:-25px;left:20px}.c3::after{width:45px;height:45px;top:-18px;left:60px}
        @keyframes fc{0%,100%{transform:translateX(0)}50%{transform:translateX(30px)}}
        .td{position:absolute;bottom:0;pointer-events:none;z-index:1}
        .tt{width:18px;height:50px;background:linear-gradient(90deg,#5D4037,#795548,#5D4037);margin:0 auto;border-radius:3px}
        .tp{width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-bottom:55px solid #2E7D32;position:relative;margin-bottom:-8px}
        .tp::before{content:'';position:absolute;width:0;height:0;border-left:32px solid transparent;border-right:32px solid transparent;border-bottom:45px solid #388E3C;top:18px;left:-32px}
        .fb{position:absolute;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;opacity:.3;animation:flb var(--d) ease-in-out infinite;pointer-events:none;z-index:1}
        @keyframes flb{0%,100%{transform:translateY(0) rotate(var(--r))}50%{transform:translateY(-20px) rotate(calc(var(--r)+5deg))}}

        .sl{font-family:'Fredoka One',cursive;font-size:.95rem;color:#33691E;text-shadow:1px 1px 0 rgba(255,255,255,.5);letter-spacing:1px;margin-bottom:6px}
        #gameCanvas{position:fixed;inset:0;z-index:50;display:none;cursor:pointer}
        #resOv{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
        .rc{background:linear-gradient(180deg,#FFF8E1,#FFF);border:5px solid #FF6F00;border-radius:24px;padding:30px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;animation:pi .4s cubic-bezier(.175,.885,.32,1.275)}
        @keyframes pi{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
        .star{font-size:2.5rem;margin:0 4px;transition:all .3s ease}
        .star.a{color:#FFD600;text-shadow:0 0 15px rgba(255,214,0,.6);transform:scale(1.2)}
        .star.i{color:#E0E0E0;transform:scale(.8)}
        .rb{border:3px solid;border-radius:12px;padding:12px 28px;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;transition:all .15s ease;text-shadow:1px 1px 2px rgba(0,0,0,.3)}
        .rb:hover{transform:translateY(-2px)}
        #backBtn{position:fixed;top:12px;left:12px;z-index:60;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);border-radius:10px;color:#fff;padding:8px 14px;font-family:'Fredoka One',cursive;font-size:.85rem;cursor:pointer;display:none;transition:all .2s;backdrop-filter:blur(4px)}
        #backBtn:hover{background:rgba(0,0,0,.6)}
        #muteBtn{position:fixed;top:12px;right:12px;z-index:60;background:rgba(0,0,0,.4);border:2px solid rgba(255,255,255,.3);border-radius:10px;color:#fff;padding:8px 12px;font-size:1rem;cursor:pointer;display:none;transition:all .2s;backdrop-filter:blur(4px)}
        #muteBtn:hover{background:rgba(0,0,0,.6)}

        /* ===== BOTON RECORDS EN JUEGO ===== */
        #recBtn{position:fixed;top:12px;right:58px;z-index:60;background:rgba(0,0,0,.4);border:2px solid rgba(255,215,0,.5);border-radius:10px;color:#FFD600;padding:8px 12px;font-size:1rem;cursor:pointer;display:none;transition:all .2s;backdrop-filter:blur(4px)}
        #recBtn:hover{background:rgba(0,0,0,.6);border-color:rgba(255,215,0,.8);transform:scale(1.1)}

        /* ===== BOTON RECORDS EN MENU ===== */
        .rec-menu-btn{background:linear-gradient(135deg,#FFD600,#FF8F00);border:2px solid #E65100;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.95rem;cursor:pointer;transition:all .2s;box-shadow:2px 3px 8px rgba(0,0,0,0.3);flex-shrink:0}
        .rec-menu-btn:hover{transform:scale(1.15);box-shadow:0 0 14px rgba(255,214,0,0.5)}

        /* ===== MODAL DE RECORDS ===== */
        #recOv{position:fixed;inset:0;z-index:210;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:20px}
        .rec-card{background:linear-gradient(180deg,#FFF8E1,#FFF);border:5px solid #FFD600;border-radius:24px;padding:24px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;animation:pi .4s cubic-bezier(.175,.885,.32,1.275);max-height:80vh;overflow-y:auto}
        .rec-card::-webkit-scrollbar{width:6px}.rec-card::-webkit-scrollbar-thumb{background:#FFD600;border-radius:3px}
        /* Tabs de modo */
        .rec-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:14px}
        .rec-tab{border:2px solid #ccc;border-radius:8px;padding:6px 16px;font-family:'Fredoka One',cursive;font-size:.8rem;cursor:pointer;transition:all .15s;background:#f5f5f5;color:#666}
        .rec-tab.active{background:linear-gradient(180deg,#FFB300,#FF8F00);border-color:#E65100;color:#fff;box-shadow:0 0 10px rgba(255,143,0,0.4)}
        .rec-tab:hover:not(.active){background:#eee}
        .rec-row{display:flex;align-items:center;padding:10px 14px;border-radius:10px;margin-bottom:6px;transition:all .2s}
        .rec-row:nth-child(odd){background:rgba(255,215,0,.08)}
        .rec-row:nth-child(even){background:rgba(255,111,0,.06)}
        .rec-row.highlight{background:rgba(255,111,0,.2);border:2px solid #FF6F00}
        .rec-pos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:.9rem;color:#fff;flex-shrink:0;margin-right:12px}
        .rec-pos.gold{background:linear-gradient(135deg,#FFD600,#FF8F00)}
        .rec-pos.silver{background:linear-gradient(135deg,#B0BEC5,#78909C)}
        .rec-pos.bronze{background:linear-gradient(135deg,#A1887F,#6D4C41)}
        .rec-pos.normal{background:linear-gradient(135deg,#78909C,#546E7A)}
        .rec-name{flex:1;text-align:left;font-family:'Fredoka One',cursive;font-size:.9rem;color:#333}
        .rec-score{font-family:'Fredoka One',cursive;font-size:1rem;color:#FF6F00;text-shadow:1px 1px 0 rgba(0,0,0,.1)}
        .rec-detail{font-size:.7rem;color:#888;font-family:'Nunito',sans-serif;font-weight:700}
        .rec-mode-badge{font-size:.6rem;padding:2px 6px;border-radius:4px;font-family:'Fredoka One',cursive;margin-left:4px}
        .rec-mode-badge.play{background:#00897B;color:#fff}
        .rec-mode-badge.memory{background:#EF6C00;color:#fff}
        .rec-close{background:linear-gradient(180deg,#FF7043,#D84315);border:3px solid #BF360C;border-radius:12px;color:#fff;font-family:'Fredoka One',cursive;font-size:1rem;cursor:pointer;padding:10px 36px;margin-top:16px;transition:all .15s;text-shadow:1px 1px 2px rgba(0,0,0,.3)}
        .rec-close:hover{transform:translateY(-2px)}

        /* ===== BADGE JUGADOR ===== */
        .player-badge{background:linear-gradient(135deg,#FF6F00,#E65100);border:2px solid #BF360C;border-radius:20px;padding:4px 16px;color:#fff;font-family:'Fredoka One',cursive;font-size:.8rem;text-shadow:1px 1px 2px rgba(0,0,0,.3);display:inline-flex;align-items:center;gap:6px}

        /* ===== TITULO MODO JUEGO ===== */
        .mode-title{font-family:'Fredoka One',cursive;font-size:1.05rem;color:#1B5E20;text-shadow:1px 1px 0 rgba(255,255,255,.5);letter-spacing:1.5px;margin-bottom:8px;padding:6px 18px;background:rgba(255,255,255,0.35);border-radius:20px;border:2px solid rgba(27,94,32,0.15)}

        @media(max-width:480px){
            .nb{width:48px;height:48px;font-size:1.1rem}
            .sb{font-size:1.3rem;padding:12px 36px}
            .db{font-size:.8rem;padding:8px 16px}
            .ab{font-size:.75rem;padding:8px 14px}
            .sl{font-size:.8rem}
            .mb{font-size:.8rem;padding:10px 18px}
            #recBtn{right:52px;padding:8px 10px;font-size:.9rem}
            .mode-title{font-size:.9rem;padding:5px 14px}
        }
    </style>
</head>
<body>

<!-- Musica del menu principal -->
<audio id="menuMusic" loop preload="auto">
    <source src="audio2.mp3" type="audio/mpeg">
</audio>

<!-- Musica del juego -->
<audio id="bgMusic" loop preload="auto">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- ===== PANTALLA DE LOGIN ===== -->
<div id="loginScr">
    <div class="login-balloon" style="width:50px;height:62px;background:#FF5252;top:10%;left:8%;--d:5s;--r:-5deg"></div>
    <div class="login-balloon" style="width:40px;height:50px;background:#FFD600;top:20%;right:10%;--d:6s;--r:4deg;animation-delay:-1.5s"></div>
    <div class="login-balloon" style="width:45px;height:56px;background:#69F0AE;bottom:15%;left:12%;--d:7s;--r:-3deg;animation-delay:-3s"></div>
    <div class="login-balloon" style="width:35px;height:44px;background:#FF4081;bottom:20%;right:15%;--d:4.5s;--r:6deg;animation-delay:-2s"></div>
    <div class="login-balloon" style="width:30px;height:38px;background:#00E5FF;top:35%;left:5%;--d:5.5s;--r:-7deg;animation-delay:-4s"></div>
    <div class="login-balloon" style="width:38px;height:48px;background:#AA00FF;top:8%;right:25%;--d:6.5s;--r:2deg;animation-delay:-1s"></div>
    <div class="login-star" style="top:12%;left:30%;font-size:1.2rem;--d:3s"><i class="fas fa-star"></i></div>
    <div class="login-star" style="top:25%;right:30%;font-size:.8rem;--d:4s;animation-delay:-1s"><i class="fas fa-star"></i></div>
    <div class="login-star" style="bottom:30%;left:25%;font-size:1rem;--d:3.5s;animation-delay:-2s"><i class="fas fa-star"></i></div>
    <div class="login-star" style="bottom:12%;right:20%;font-size:1.4rem;--d:2.8s;animation-delay:-.5s"><i class="fas fa-star"></i></div>
    <div class="login-star" style="top:45%;left:15%;font-size:.7rem;--d:5s;animation-delay:-3s"><i class="fas fa-star"></i></div>
    <div class="login-star" style="top:60%;right:8%;font-size:1.1rem;--d:3.2s;animation-delay:-1.5s"><i class="fas fa-star"></i></div>

    <div class="login-card">
        <div style="font-size:3rem;margin-bottom:8px">🎈</div>
        <h1 class="font-display text-2xl sm:text-3xl text-yellow-50 tracking-wider mb-2" style="text-shadow:2px 3px 4px rgba(0,0,0,.5)">GLOBOS DE MULTIPLICAR</h1>
        <p class="font-body font-bold text-sm text-yellow-200 mb-5" style="text-shadow:1px 1px 2px rgba(0,0,0,.3)">Ingresa tu nombre para comenzar</p>
        <input type="text" id="playerNameInput" class="login-input" placeholder="Tu nombre..." maxlength="15" autocomplete="off">
        <div id="loginErr" class="login-err"></div>
        <button id="loginBtn" class="login-btn"><i class="fas fa-sign-in-alt mr-2"></i>ENTRAR</button>
    </div>
</div>

<!-- ===== PANTALLA DE SELECCION ===== -->
<div id="selScr">
    <div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div>
    <div class="fb" style="width:40px;height:50px;background:#FF5252;top:12%;left:8%;--d:4s;--r:-5deg"></div>

function loadRecords(){
    try{var d=localStorage.getItem(REC_KEY);return d?JSON.parse(d):[];}catch(e){return[];}
}

function saveRecord(name,score,correct,attempts,mode){
    var records=loadRecords();
    var now=new Date();
    var dateStr=now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
    records.push({name:name,score:score,correct:correct,attempts:attempts,date:dateStr,mode:mode||'play'});
    /* Ordenar por puntuacion descendente dentro de cada modo */
    records.sort(function(a,b){return b.score-a.score;});
    if(records.length>30)records=records.slice(0,30);
    try{localStorage.setItem(REC_KEY,JSON.stringify(records));}catch(e){}
}

function showRecordsModal(){
    var records=loadRecords();

    var listEl=document.getElementById('recList');

                    '<div class="rec-detail">'+r.correct+' ok / '+r.attempts+' err</div>'+

/* ==================== CLASE GLOBO ==================== */
function Balloon(x,y,num,color,correct,radius){
    this.x=x;this.y=y;this.number=num;this.color=color;this.isCorrect=correct;
    this.radius=Math.max(18,radius);this.vx=(Math.random()-0.5)*1.4;this.vy=(Math.random()-0.5)*1.4-0.2;

}
Balloon.prototype.update=function(w,h){
    if(this.dying){this.opacity-=0.08;if(this.opacity<=0)this.alive=false;return;}
    if(!this.alive)return;
    this.wob+=this.wobS;this.x+=this.vx+Math.sin(this.wob)*0.3;this.y+=this.vy+Math.cos(this.wob*0.7)*0.18;
    var t=130+this.radius,b=h-50-this.radius,l=this.radius+5,r=w-this.radius-5;
    if(this.x<l){this.x=l;this.vx=Math.abs(this.vx)*0.8;}
    if(this.x>r){this.x=r;this.vx=-Math.abs(this.vx)*0.8;}
    if(this.y<t){this.y=t;this.vy=Math.abs(this.vy)*0.8;}
    if(this.y>b){this.y=b;this.vy=-Math.abs(this.vy)*0.8;}
    if(this.shake>0)this.shake--;
};
Balloon.prototype.draw=function(c){
    if(!this.alive)return;
    var ox=this.shake>0?Math.sin(this.shake*1.5)*6:0,x=this.x+ox,y=this.y,r=this.radius;

    /* Hilo */
    c.beginPath();c.moveTo(x,y+r);c.quadraticCurveTo(x+4,y+r+16,x-3,y+r+32);

    c.beginPath();c.ellipse(x,y,r*0.82,r,0,0,Math.PI*2);

    c.beginPath();c.ellipse(x-r*0.22,y-r*0.28,r*0.18,r*0.32,-0.3,0,Math.PI*2);c.fillStyle='rgba(255,255,255,0.45)';c.fill();

};
Balloon.prototype.contains=function(px,py){
    if(!this.alive||this.dying)return false;

/* ==================== COLISION ENTRE GLOBOS ==================== */
function resolveCollisions(){
    var alive=balloons.filter(function(b){return b.alive&&!b.dying;});
    for(var i=0;i<alive.length;i++){
        for(var j=i+1;j<alive.length;j++){
            var a=alive[i],b=alive[j],dx=b.x-a.x,dy=b.y-a.y;
            var dist=Math.sqrt(dx*dx+dy*dy),minDist=a.colR+b.colR;
            if(dist<minDist&&dist>0.01){
                var nx=dx/dist,ny=dy/dist,overlap=(minDist-dist)*0.5+0.5;
                a.x-=nx*overlap;a.y-=ny*overlap;b.x+=nx*overlap;b.y+=ny*overlap;
                var dvx=a.vx-b.vx,dvy=a.vy-b.vy,dot=dvx*nx+dvy*ny;
                if(dot>0){a.vx-=dot*nx*0.5;a.vy-=dot*ny*0.5;b.vx+=dot*nx*0.5;b.vy+=dot*ny*0.5;}
                [a,b].forEach(function(bl){var spd=Math.sqrt(bl.vx*bl.vx+bl.vy*bl.vy);if(spd>2.2){bl.vx=(bl.vx/spd)*2.2;bl.vy=(bl.vy/spd)*2.2;}});
            }
        }
    }
}

/* ==================== PREGUNTAS ==================== */
function generateQuestions(){
    questions=[];
    if(selGameMode==='memory'){
        /* Memoria siempre usa tabla especifica */
        var t=selTable;
        for(var i=1;i<=10;i++)questions.push({a:t,b:i,answer:t*i});
        shuf(questions);
    }else if(selTable==='all'){
        var count;if(selDiff==='easy')count=10;else if(selDiff==='hard')count=20;else count=15;
        var pool=[];for(var t2=1;t2<=12;t2++)for(var j=1;j<=10;j++)pool.push({a:t2,b:j,answer:t2*j});
        shuf(pool);questions=pool.slice(0,count);
    }else{
        for(var k=1;k<=10;k++)questions.push({a:selTable,b:k,answer:selTable*k});
        shuf(questions);
    }
    maxScore=questions.length*10;
}

/* ==================== NUMEROS INCORRECTOS ==================== */
function genWrongs(correct,tableNum,count,exclude){
    var wr=new Set();
    for(var i=1;i<=10;i++){var v=tableNum*i;if(v!==correct&&!exclude.has(v))wr.add(v);}
    for(var d=-6;d<=6;d++){if(d!==0&&correct+d>0&&!exclude.has(correct+d))wr.add(correct+d);}
    var att=0;while(wr.size<count+20&&att<400){var r=Math.max(1,Math.floor(Math.random()*(Math.max(correct,20)+50))+1);if(!exclude.has(r))wr.add(r);att++;}
    wr.delete(correct);var arr=Array.from(wr);shuf(arr);return arr.slice(0,count);
}

/* ==================== CONFIGURACION POR DIFICULTAD ==================== */
function getFillerCount(){var m=canvas.width<600;if(selDiff==='easy')return m?3:5;if(selDiff==='hard')return m?12:18;return m?7:10;}
function getNewPerRound(){var m=canvas.width<600;if(selDiff==='easy')return m?4:5;if(selDiff==='hard')return m?5:7;return m?5:6;}
function getMemoryCounts(){if(selDiff==='easy')return{c:10,w:4};if(selDiff==='hard')return{c:20,w:5};return{c:15,w:5};}

/* ==================== COLOCAR GLOBOS SIN SOLAPAR ==================== */
function placeBalloons(allNums,isCorrectFn){
    var m=canvas.width<600;
    var radius=m?Math.min(36,canvas.width/15):Math.min(28,canvas.width/24);
    var margin=radius+8,top=145+radius,bottom=canvas.height-50-radius,left=margin,right=canvas.width-margin;
    var placed=[];
    allNums.forEach(function(num,idx){
        var x,y,tries=0,ok=false;
        while(tries<200&&!ok){
            x=left+Math.random()*(right-left);y=top+Math.random()*(bottom-top);ok=true;
            for(var p=0;p<placed.length;p++){var dx=x-placed[p].x,dy=y-placed[p].y;if(Math.sqrt(dx*dx+dy*dy)<radius*2.2){ok=false;break;}}
            tries++;
        }
        placed.push({x:x,y:y});
        balloons.push(new Balloon(x,y,num,COLS[idx%COLS.length],isCorrectFn(num),radius));
    });
}

/* ==================== SPAWN: TABLA COMPLETA ==================== */
function spawnFullTable(){
    balloons=[];particles=[];
    var t=selTable,fillerCount=getFillerCount();
    var correctSet=new Set();for(var i=1;i<=10;i++)correctSet.add(t*i);
    var wrongNums=genWrongs(0,t,fillerCount,correctSet);
    var allNums=[];for(var j=1;j<=10;j++)allNums.push(t*j);
    allNums=allNums.concat(wrongNums);shuf(allNums);
    placeBalloons(allNums,function(n){return correctSet.has(n);});
}

/* ==================== SPAWN: TODAS LAS TABLAS (MIXTO) ==================== */
function spawnMixedNext(){
    if(curQ>=questions.length)return;
    var q=questions[curQ],newCount=getNewPerRound(),wrongCount=newCount-1;
    var existing=new Set();balloons.forEach(function(b){if(b.alive&&!b.dying)existing.add(b.number);});
    var wrongs=genWrongs(q.answer,q.a,wrongCount,existing);
    var allNums=[q.answer].concat(wrongs);shuf(allNums);
    var m=canvas.width<600;
    var radius=m?Math.min(36,canvas.width/15):Math.min(28,canvas.width/24);
    var margin=radius+8,top=145+radius,bottom=canvas.height-50-radius,left=margin,right=canvas.width-margin;
    var existB=balloons.filter(function(b){return b.alive&&!b.dying;});
    allNums.forEach(function(num,i){
        var x,y,tries=0,ok=false;
        while(tries<150&&!ok){
            x=left+Math.random()*(right-left);y=top+Math.random()*(bottom-top);ok=true;
            for(var p=0;p<existB.length;p++){var dx=x-existB[p].x,dy=y-existB[p].y;if(Math.sqrt(dx*dx+dy*dy)<radius*2.2){ok=false;break;}}
            tries++;
        }
        var b=new Balloon(x,y,num,COLS[i%COLS.length],num===q.answer,radius);
        balloons.push(b);existB.push(b);
    });
}

/* ==================== SPAWN: AYUDA MEMORIA ==================== */
function spawnMemoryQ(){
    balloons=balloons.filter(function(b){return b.alive&&!b.dying;});
    particles=particles.filter(function(p){return p.life>0;});
    if(curQ>=questions.length)return;
    var q=questions[curQ],counts=getMemoryCounts();
    var correctCount=counts.c,wrongCount=counts.w;
    memoryRemain=correctCount;
    var wrongs=genWrongs(q.answer,q.a,wrongCount,new Set());
    var allNums=[];for(var i=0;i<correctCount;i++)allNums.push(q.answer);
    allNums=allNums.concat(wrongs);shuf(allNums);
    var m=canvas.width<600,totalG=allNums.length;
    var radius;
    if(totalG>18)radius=m?Math.min(28,canvas.width/18):Math.min(22,canvas.width/26);
    else if(totalG>12)radius=m?Math.min(32,canvas.width/16):Math.min(25,canvas.width/23);
    else radius=m?Math.min(38,canvas.width/14):Math.min(30,canvas.width/22);
    var margin=radius+6,top=150+radius,bottom=canvas.height-45-radius,left=margin,right=canvas.width-margin;
    allNums.forEach(function(num,i){
        var x,y,tries=0,ok=false;
        while(tries<200&&!ok){
            x=left+Math.random()*(right-left);y=top+Math.random()*(bottom-top);ok=true;
            for(var p=0;p<balloons.length;p++){var b=balloons[p];if(!b.alive||b.dying)continue;var dx=x-b.x,dy=y-b.y;if(Math.sqrt(dx*dx+dy*dy)<radius*2.15){ok=false;break;}}
            tries++;
        }
        balloons.push(new Balloon(x,y,num,COLS[i%COLS.length],num===q.answer,radius));
    });
}

/* ==================== VERIFICAR PUNTUACION BAJA ==================== */
function checkHalfScore(){
    /* Solo verificar si hay al menos 3 errores acumulados */
    if(attempts<3)return false;
    /* Si la puntuacion actual es menor a la mitad del maximo posible */
    return correctPoints<maxScore/2;
}

/* ==================== INTERACCION: CLIC EN GLOBO ==================== */
function handleInteract(px,py){
    if(gameState!=='playing'||curQ>=questions.length||isRestarting)return;
    for(var i=balloons.length-1;i>=0;i--){
        var b=balloons[i];
        if(!b.alive||b.dying)continue;
        if(b.contains(px,py)){
            var q=questions[curQ];
            if(gameMode==='memory'){
                if(b.isCorrect){
                    /* Correcto en memoria */
                    b.alive=false;memoryRemain--;popSnd();correctPoints+=10;
                    for(var p=0;p<15;p++)particles.push(new Particle(b.x,b.y,COLS[Math.floor(Math.random()*COLS.length)]));
                    if(memoryRemain<=0){
                        balloons.forEach(function(ob){if(ob.alive&&!ob.dying)ob.dying=true;});
                        setTimeout(function(){
                            balloons=balloons.filter(function(b){return!b.alive;});
                            particles=particles.filter(function(p){return p.life>0;});
                            curQ++;
                            if(curQ>=questions.length)endGame();
                            else spawnMemoryQ();
                        },500);
                    }
                }else{
                    /* Error en memoria: restar puntos */
                    b.shake=20;attempts++;
                    correctPoints=Math.max(0,correctPoints-WRONG_PENALTY);
                    errSnd();
                    /* Verificar si debe reiniciar */
                    if(checkHalfScore()){triggerRestart();return;}
                }
            }else{
                /* Modo jugar (singleTable o mixed) */
                if(b.isCorrect&&b.number===q.answer){
                    /* Correcto */
                    b.alive=false;correctPoints+=10;popSnd();
                    for(var p2=0;p2<25;p2++)particles.push(new Particle(b.x,b.y,COLS[Math.floor(Math.random()*COLS.length)]));
                    setTimeout(function(){
                        curQ++;
                        if(curQ>=questions.length)endGame();
                        else if(gameMode==='mixedTable')spawnMixedNext();
                    },350);
                }else{
                    /* Error: restar puntos */
                    b.shake=20;attempts++;
                    correctPoints=Math.max(0,correctPoints-WRONG_PENALTY);
                    errSnd();
                    /* Verificar si debe reiniciar */
                    if(checkHalfScore()){triggerRestart();return;}
                }
            }
            return;
        }
    }
}

/* ==================== REINICIO POR PUNTUACION BAJA ==================== */
function triggerRestart(){
    isRestarting=true;restartCountdown=90; /* ~1.5 segundos a 60fps */
    restartSnd();
    /* Guardar el record parcial */
    saveRecord(playerName,correctPoints,Math.floor(correctPoints/10),attempts,selGameMode);
}

/* ==================== FIN DE JUEGO ==================== */
function endGame(){
    gameState='results';winSnd();
    saveRecord(playerName,correctPoints,Math.floor(correctPoints/10),attempts,selGameMode);
    var pct=maxScore>0?correctPoints/maxScore:0,sc=0;
    if(pct>=0.9)sc=3;else if(pct>=0.7)sc=2;else if(pct>=0.4)sc=1;
    document.getElementById('resOv').style.display='flex';
    var stE=document.getElementById('starsC');stE.innerHTML='';
    for(var i=0;i<3;i++){var s=document.createElement('i');s.className='fas fa-star star '+(i<sc?'a':'i');stE.appendChild(s);}
    var titles=['Sigue practicando','Bien hecho','Muy bien','Excelente'];
    document.getElementById('rTitle').textContent=titles[sc];
    document.getElementById('rPlayer').textContent='Jugador: '+playerName;
    document.getElementById('rScore').textContent='Puntos: '+correctPoints+' / '+maxScore;
    document.getElementById('rDetail').textContent='Correctos: '+Math.floor(correctPoints/10)+' | Errores: '+attempts;
    if(afId){cancelAnimationFrame(afId);afId=null;}
}

/* ==================== GAME LOOP ==================== */
function gameLoop(){
    if(gameState!=='playing')return;
    var w=canvas.width,h=canvas.height;
    ctx.clearRect(0,0,w,h);
    drawBG();

    /* Actualizar y dibujar globos */
    for(var i=0;i<balloons.length;i++)balloons[i].update(w,h);
    resolveCollisions();
    for(var i2=0;i2<balloons.length;i2++)balloons[i2].draw(ctx);
    balloons=balloons.filter(function(b){return b.alive;});

    /* Particulas */
    for(var i3=0;i3<particles.length;i3++)particles[i3].update();
    for(var i4=0;i4<particles.length;i4++)particles[i4].draw(ctx);
    particles=particles.filter(function(p){return p.life>0;});

    drawHUD();

    /* Mensaje de reinicio por puntuacion baja */
    if(isRestarting){
        /* Fondo oscuro */
        ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,w,h);
        /* Icono */
        ctx.font='bold '+Math.min(50,w*0.12)+'px "Fredoka One",cursive';
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillStyle='#FF5252';ctx.fillText('⚠',w/2,h/2-50);
        /* Titulo */
        ctx.font='bold '+Math.min(24,w*0.055)+'px "Fredoka One",cursive';
        ctx.fillStyle='#FF5252';
        ctx.fillText('PUNTUACION MUY BAJA',w/2,h/2-10);
        /* Detalle */
        ctx.font='bold '+Math.min(14,w*0.035)+'px "Fredoka One",cursive';
        ctx.fillStyle='#FFD600';
        ctx.fillText('Tu puntuacion bajo de la mitad ('+Math.floor(maxScore/2)+' pts)',w/2,h/2+20);
        /* Subtexto */
        ctx.font='bold '+Math.min(16,w*0.04)+'px "Fredoka One",cursive';
        ctx.fillStyle='rgba(255,248,220,'+(0.5+0.5*Math.sin(restartCountdown*0.15))+')';
        ctx.fillText('Reiniciando...',w/2,h/2+50);
        /* Cuenta regresiva */
        var secs=Math.ceil(restartCountdown/60);
        ctx.font='bold '+Math.min(28,w*0.06)+'px "Fredoka One",cursive';
        ctx.fillStyle='#fff';
        ctx.fillText(secs,w/2,h/2+85);

        restartCountdown--;
        if(restartCountdown<=0){
            isRestarting=false;
            startGame();
            return;
        }
    }

    afId=requestAnimationFrame(gameLoop);
}

/* ==================== INICIAR JUEGO ==================== */
function startGame(){
    correctPoints=0;attempts=0;curQ=0;balloons=[];particles=[];
    isRestarting=false;restartCountdown=0;
    generateQuestions();

    canvas.width=window.innerWidth;canvas.height=window.innerHeight;
    initClouds();

    if(selGameMode==='memory'){
        gameMode='memory';
        spawnMemoryQ();
    }else if(selTable==='all'){
        gameMode='mixedTable';
        spawnMixedNext();
    }else{
        gameMode='singleTable';
        spawnFullTable();
    }

    gameState='playing';
    document.getElementById('selScr').style.display='none';
    canvas.style.display='block';
    document.getElementById('backBtn').style.display='block';
    document.getElementById('muteBtn').style.display='block';
    document.getElementById('recBtn').style.display='block';

    /* Cambiar musica: detener menu, iniciar juego */
    stopMenuMusic();startMusic();

    if(afId)cancelAnimationFrame(afId);
    afId=requestAnimationFrame(gameLoop);
}

/* ==================== VOLVER AL MENU ==================== */
function goToMenu(){
    gameState='menu';
    if(afId){cancelAnimationFrame(afId);afId=null;}
    canvas.style.display='none';
    document.getElementById('backBtn').style.display='none';
    document.getElementById('muteBtn').style.display='none';
    document.getElementById('recBtn').style.display='none';
    document.getElementById('resOv').style.display='none';
    document.getElementById('selScr').style.display='flex';

    /* Cambiar musica: detener juego, iniciar menu */
    stopMusic();startMenuMusic();
}

/* ==================== UTILIDADES ==================== */
function shuf(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}}
function updateChalk(){

        var a=Math.floor(Math.random()*12)+1,b=Math.floor(Math.random()*10)+1;

    }else{
        var b2=Math.floor(Math.random()*10)+1;
        el.textContent=selTable+' x '+b2+' = '+(selTable*b2);
    }
}

        document.getElementById('playerBadgeName').textContent=name;
        document.getElementById('loginScr').style.display='none';
        document.getElementById('selScr').style.display='flex';
        gameState='menu';
        startMenuMusic();
    });
    document.getElementById('playerNameInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('loginBtn').click();});
    document.getElementById('playerNameInput').addEventListener('input',function(){document.getElementById('loginErr').textContent='';});

    /* --- SELECCION DE TABLA --- */
    var numBtns=document.querySelectorAll('#numGrid .nb');
    numBtns.forEach(function(btn){
        btn.addEventListener('click',function(){
            ea();
            /* Quitar seleccion de todos */
            numBtns.forEach(function(b){b.classList.remove('sel');});
            document.getElementById('allBtn').classList.remove('sel');
            /* Seleccionar este */
            btn.classList.add('sel');
            selTable=parseInt(btn.getAttribute('data-table'));
            updateChalk();
            /* Habilitar modo memoria ya que es tabla especifica */
            document.getElementById('memBtn').classList.remove('disabled');
            /* Si estaba seleccionado "memory" y volvemos a tabla, mantenerlo */
        });
    });
    document.getElementById('allBtn').addEventListener('click',function(){
        ea();
        numBtns.forEach(function(b){b.classList.remove('sel');});
        this.classList.add('sel');
        selTable='all';
        updateChalk();
        /* Deshabilitar memoria en modo "todas las tablas" */
        document.getElementById('memBtn').classList.add('disabled');
        /* Si estaba seleccionado memoria, cambiar a jugar */
        if(selGameMode==='memory'){
            selGameMode='play';
            document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('sel');});
            document.querySelector('.mb.play').classList.add('sel');
        }
    });

    /* --- SELECCION DE MODO --- */
    document.querySelectorAll('.mb').forEach(function(btn){
        btn.addEventListener('click',function(){
            if(this.classList.contains('disabled'))return;
            ea();
            document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('sel');});
            this.classList.add('sel');
            selGameMode=this.getAttribute('data-mode');
        });
    });

    /* --- SELECCION DE DIFICULTAD --- */
    document.querySelectorAll('.db').forEach(function(btn){
        btn.addEventListener('click',function(){
            ea();
            document.querySelectorAll('.db').forEach(function(b){b.classList.remove('sel');});
            this.classList.add('sel');
            selDiff=this.getAttribute('data-diff');
        });
    });

    /* --- BOTON INICIO --- */
    document.getElementById('startBtn').addEventListener('click',function(){ea();startGame();});

    /* --- CANVAS: CLIC Y TOUCH --- */
    function getCanvasPos(e){
        var rect=canvas.getBoundingClientRect();
        var cx,cy;
        if(e.touches&&e.touches.length>0){cx=e.touches[0].clientX-rect.left;cy=e.touches[0].clientY-rect.top;}
        else if(e.changedTouches&&e.changedTouches.length>0){cx=e.changedTouches[0].clientX-rect.left;cy=e.changedTouches[0].clientY-rect.top;}
        else{cx=e.clientX-rect.left;cy=e.clientY-rect.top;}
        return{x:cx*scaleFactor,y:cy*scaleFactor};
    }
    var scaleFactor=1;
    function updateScale(){scaleFactor=canvas.width/canvas.getBoundingClientRect().width;}
    canvas.addEventListener('click',function(e){ea();updateScale();var p=getCanvasPos(e);handleInteract(p.x,p.y);});
    canvas.addEventListener('touchstart',function(e){e.preventDefault();ea();updateScale();var p=getCanvasPos(e);handleInteract(p.x,p.y);},{passive:false});

    /* --- BOTON VOLVER --- */
    document.getElementById('backBtn').addEventListener('click',function(){ea();goToMenu();});

    /* --- BOTON MUTE --- */
    document.getElementById('muteBtn').addEventListener('click',function(){ea();toggleMute();});

    /* --- BOTONES DE RESULTADOS --- */
    document.getElementById('againBtn').addEventListener('click',function(){ea();document.getElementById('resOv').style.display='none';startGame();});
    document.getElementById('menuBtn').addEventListener('click',function(){ea();goToMenu();});

    /* --- RECORDS: Boton en menu --- */
    document.getElementById('recMenuBtn').addEventListener('click',function(){ea();showRecordsModal();});
    /* --- RECORDS: Boton en juego --- */
    document.getElementById('recBtn').addEventListener('click',function(){ea();showRecordsModal();});
    /* --- RECORDS: Cerrar --- */
    document.getElementById('recCloseBtn').addEventListener('click',function(){closeRecordsModal();});
    /* --- RECORDS: Tabs de filtro --- */
    document.querySelectorAll('.rec-tab').forEach(function(tab){
        tab.addEventListener('click',function(){
            document.querySelectorAll('.rec-tab').forEach(function(t){t.classList.remove('active');});
            this.classList.add('active');
            currentRecFilter=this.getAttribute('data-recfilter');
            showRecordsModal();
        });
    });
    /* Cerrar records al clic fuera */
    document.getElementById('recOv').addEventListener('click',function(e){if(e.target===this)closeRecordsModal();});

    /* --- RESIZE --- */
    window.addEventListener('resize',function(){
        if(gameState==='playing'&&canvas.style.display==='block'){
            canvas.width=window.innerWidth;canvas.height=window.innerHeight;
            initClouds();
        }
    });
});
</script>
</body>
</html>
